<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Калории</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:0}
input,textarea{outline:none;font-family:inherit}
button{font-family:inherit;cursor:pointer}
#app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* Header */
#header{padding:20px 20px 14px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0a0a0a;z-index:10}
#header-top{display:flex;justify-content:space-between;align-items:flex-start}
#date-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
#title{font-size:22px;font-weight:600;letter-spacing:-.02em}
#gear-btn{background:none;border:none;color:#444;font-size:20px;padding:4px 8px;margin-top:4px}
#kcal-row{display:flex;justify-content:space-between;align-items:flex-end;margin:14px 0 8px}
#kcal-num{font-size:34px;font-weight:600;font-family:'DM Mono',monospace;color:#f59e0b}
#kcal-unit{font-size:14px;color:#555}
#goal-info{text-align:right}
#goal-label{font-size:11px;color:#555;margin-bottom:2px}
#remaining{font-size:13px;font-weight:600}
#prog-track{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
#prog-fill{height:100%;border-radius:2px;transition:width .5s ease,background .3s}
#macros{display:flex;gap:8px;margin-top:10px}
.macro-card{flex:1;background:#111;border-radius:10px;padding:8px 10px;border:1px solid #1a1a1a}
.macro-lbl{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.macro-val{font-size:15px;font-weight:600;font-family:'DM Mono',monospace}

/* Bottom nav */
#bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0a0a;border-top:1px solid #1a1a1a;display:flex;z-index:30}
.nav-btn{flex:1;background:none;border:none;padding:12px 0 20px;font-size:11px;color:#444;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
.nav-btn.active{color:#f59e0b}
.nav-icon{font-size:20px}

/* Pages */
.page{flex:1;overflow-y:auto;padding:12px 20px 100px;display:none}
.page.active{display:block}

/* Today page */
#empty{text-align:center;margin-top:70px;color:#444}
#empty .icon{font-size:44px;margin-bottom:10px}
#empty p{font-size:14px}
#empty small{font-size:12px;color:#333;margin-top:4px;display:block}
.entry{background:#111;border:1px solid #1a1a1a;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.entry-body{flex:1;min-width:0}
.entry-name{font-size:14px;font-weight:500;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-raw{font-size:11px;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.entry-macros{display:flex;gap:8px;font-size:11px}
.entry-right{text-align:right;flex-shrink:0}
.entry-kcal{font-size:17px;font-weight:600;color:#f59e0b;font-family:'DM Mono',monospace}
.entry-time{font-size:10px;color:#444;margin-top:2px}
.del-btn{background:none;border:none;color:#282828;font-size:20px;padding:2px 6px;flex-shrink:0;transition:color .15s}
.del-btn:hover,.del-btn:active{color:#f87171}

/* Input bar (today only) */
#input-bar{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0a0a0a;border-top:1px solid #1a1a1a;padding:10px 20px 10px;z-index:20;display:none}
#input-bar.visible{display:block}
#error-msg{font-size:12px;color:#f87171;margin-bottom:7px;display:none}
#input-row{display:flex;gap:8px;align-items:flex-end}
#food-input{flex:1;background:#111;border:1px solid #222;border-radius:12px;padding:11px 14px;color:#f0f0f0;font-size:14px;resize:none;line-height:1.4}
#send-btn{border:none;border-radius:12px;width:48px;height:48px;font-size:20px;flex-shrink:0;transition:background .2s,color .2s;background:#1a1a1a;color:#444}
#send-btn.ready{background:#f59e0b;color:#0a0a0a}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;animation:spin .8s linear infinite}

/* History page */
.day-block{margin-bottom:20px}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #1a1a1a}
.day-title{font-size:13px;font-weight:600;color:#888}
.day-kcal{font-size:13px;font-weight:600;color:#f59e0b;font-family:'DM Mono',monospace}
#hist-empty{text-align:center;margin-top:70px;color:#444;font-size:14px}
#hist-loading{text-align:center;margin-top:70px;color:#555;font-size:14px}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:50;padding:24px}
.modal{background:#111;border:1px solid #222;border-radius:16px;padding:24px;width:100%;max-width:320px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:10px;padding:11px 14px;color:#f0f0f0;font-size:16px}
.modal-btns{display:flex;gap:8px;margin-top:12px}
.btn-cancel{flex:1;background:#1a1a1a;color:#888;border:none;border-radius:10px;padding:12px;font-size:14px}
.btn-save{flex:1;background:#f59e0b;color:#0a0a0a;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600}

/* API key screen */
#key-screen{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;z-index:100}
#key-screen .icon{font-size:48px;margin-bottom:14px}
#key-screen h2{font-size:18px;font-weight:600;margin-bottom:8px}
#key-screen p{font-size:13px;color:#555;text-align:center;line-height:1.6;margin-bottom:22px}
#key-screen a{color:#f59e0b}
#key-input{width:100%;max-width:340px;background:#111;border:1px solid #333;border-radius:12px;padding:12px 16px;color:#f0f0f0;font-size:13px;font-family:'DM Mono',monospace;margin-bottom:10px}
#key-save{width:100%;max-width:340px;background:#1a1a1a;color:#444;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;transition:background .2s,color .2s}
#key-save.ready{background:#f59e0b;color:#0a0a0a}
</style>
</head>
<body>

<!-- API Key screen -->
<div id="key-screen">
  <div class="icon">🔑</div>
  <h2>API ключ Anthropic</h2>
  <p>Нужен для оценки калорий через AI.<br>Получи на <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
  <input id="key-input" type="text" placeholder="sk-ant-..."/>
  <button id="key-save">Сохранить</button>
</div>

<!-- Main app -->
<div id="app" style="display:none">
  <div id="header">
    <div id="header-top">
      <div>
        <div id="date-label"></div>
        <div id="title">Калории</div>
      </div>
      <button id="gear-btn">⚙</button>
    </div>
    <div id="kcal-row">
      <div><span id="kcal-num">0</span><span id="kcal-unit"> ккал</span></div>
      <div id="goal-info">
        <div id="goal-label">цель <span id="goal-display">2000</span> ккал</div>
        <div id="remaining">−2000 осталось</div>
      </div>
    </div>
    <div id="prog-track"><div id="prog-fill" style="width:0%"></div></div>
    <div id="macros">
      <div class="macro-card"><div class="macro-lbl">Белки</div><div class="macro-val" id="m-p" style="color:#60a5fa">0г</div></div>
      <div class="macro-card"><div class="macro-lbl">Жиры</div><div class="macro-val" id="m-f" style="color:#f59e0b">0г</div></div>
      <div class="macro-card"><div class="macro-lbl">Углеводы</div><div class="macro-val" id="m-c" style="color:#4ade80">0г</div></div>
      <div class="macro-card"><div class="macro-lbl">Клетчатка</div><div class="macro-val" id="m-fi" style="color:#c084fc">0г</div></div>
    </div>
  </div>

  <!-- Today -->
  <div id="page-today" class="page active">
    <div id="empty">
      <div class="icon">🥗</div>
      <p>Добавь что съел сегодня</p>
      <small>Напиши в поле ниже — AI посчитает КБЖУ</small>
    </div>
  </div>

  <!-- History -->
  <div id="page-history" class="page">
    <div id="hist-loading">Загрузка...</div>
    <div id="hist-content" style="display:none"></div>
    <div id="hist-empty" style="display:none">История пуста</div>
  </div>

  <!-- Input bar -->
  <div id="input-bar" class="visible">
    <div id="error-msg"></div>
    <div id="input-row">
      <textarea id="food-input" rows="2" placeholder="Что съел? Например: тарелка борща со сметаной..."></textarea>
      <button id="send-btn">↑</button>
    </div>
  </div>

  <!-- Bottom nav -->
  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="switchTab('today')">
      <span class="nav-icon">🍽</span>Сегодня
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <span class="nav-icon">📅</span>История
    </button>
  </div>
</div>

<!-- Goal modal -->
<div id="goal-modal" class="overlay" style="display:none">
  <div class="modal">
    <h2>Дневная цель калорий</h2>
    <input id="goal-input" type="number" placeholder="2000"/>
    <div class="modal-btns">
      <button class="btn-cancel" id="goal-cancel">Отмена</button>
      <button class="btn-save" id="goal-confirm">Сохранить</button>
    </div>
  </div>
</div>

<script>
const TODAY = new Date().toISOString().split("T")[0];
const SB_URL  = "https://qsyssugfcsmpomxyaahw.supabase.co/rest/v1";
const SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzeXNzdWdmY3NtcG9teHlhYWh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NTk5MzcsImV4cCI6MjA5NjEzNTkzN30.t77lfLvyFE3qgtG7AEsOYF6GGF7BDlgIn-rzvTBR1kY";
const SB_HDR  = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" };

let entries = [];
let goal = Number(localStorage.getItem("goal")) || 2000;
let apiKey = localStorage.getItem("anthropic_key") || "";

// --- Supabase helpers ---
async function dbLoad(date) {
  const res = await fetch(`${SB_URL}/entries?date=eq.${date}&order=id.asc`, { headers: SB_HDR });
  if (!res.ok) throw new Error("DB load failed");
  return res.json();
}

async function dbInsert(entry) {
  const res = await fetch(`${SB_URL}/entries`, {
    method: "POST",
    headers: { ...SB_HDR, "Prefer": "return=minimal" },
    body: JSON.stringify(entry)
  });
  if (!res.ok) { const t = await res.text(); throw new Error("DB insert: " + t); }
}

async function dbDelete(id) {
  const res = await fetch(`${SB_URL}/entries?id=eq.${id}`, { method: "DELETE", headers: SB_HDR });
  if (!res.ok) throw new Error("DB delete failed");
}

async function dbHistory() {
  const res = await fetch(`${SB_URL}/entries?date=neq.${TODAY}&order=date.desc,id.asc&limit=200`, { headers: SB_HDR });
  if (!res.ok) throw new Error("DB history failed");
  return res.json();
}

// --- Anthropic API ---
async function estimateNutrition(text) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-haiku-4-5-20251001",
      max_tokens: 1024,
      system: 'Return ONLY compact JSON, no spaces, no markdown:\n{"kcal":number,"protein":number,"fat":number,"carbs":number,"fiber":number,"name":"Russian name max 25 chars"}\nEstimate nutrition for the food described.',
      messages: [{ role: "user", content: text }]
    })
  });
  const rawText = await res.text();
  if (!res.ok) throw new Error("API " + res.status + ": " + rawText.slice(0, 100));
  const data = JSON.parse(rawText);
  const raw = data.content?.find(b => b.type === "text")?.text || "{}";
  try {
    const match = raw.match(/\{[\s\S]*?\}/);
    const n = JSON.parse(match ? match[0] : "{}");
    return {
      kcal:    Math.max(0, Number(n.kcal)    || 0),
      protein: Math.max(0, Number(n.protein) || 0),
      fat:     Math.max(0, Number(n.fat)     || 0),
      carbs:   Math.max(0, Number(n.carbs)   || 0),
      fiber:   Math.max(0, Number(n.fiber)   || 0),
      name:    String(n.name || text).slice(0, 35),
    };
  } catch { throw new Error("Не удалось разобрать ответ AI"); }
}

// --- DOM ---
function el(id) { return document.getElementById(id); }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function showError(msg) { const e=el("error-msg"); e.textContent=msg; e.style.display=msg?"block":"none"; }

function renderToday() {
  const list = el("page-today");
  list.querySelectorAll(".entry").forEach(e => e.remove());
  el("empty").style.display = entries.length ? "none" : "block";

  const totals = entries.reduce((a,e) => ({
    kcal:a.kcal+e.kcal, protein:a.protein+e.protein,
    fat:a.fat+e.fat, carbs:a.carbs+e.carbs, fiber:a.fiber+e.fiber
  }), {kcal:0,protein:0,fat:0,carbs:0,fiber:0});

  entries.forEach(entry => {
    const div = document.createElement("div");
    div.className = "entry";
    const diff = entry.text.toLowerCase() !== (entry.name||"").toLowerCase();
    div.innerHTML = `
      <div class="entry-body">
        <div class="entry-name">${esc(entry.name||entry.text)}</div>
        ${diff?`<div class="entry-raw">${esc(entry.text)}</div>`:""}
        <div class="entry-macros">
          <span style="color:#60a5fa">Б ${entry.protein}г</span>
          <span style="color:#f59e0b">Ж ${entry.fat}г</span>
          <span style="color:#4ade80">У ${entry.carbs}г</span>
          <span style="color:#c084fc">К ${entry.fiber}г</span>
        </div>
      </div>
      <div class="entry-right">
        <div class="entry-kcal">${entry.kcal}</div>
        <div class="entry-time">${entry.time}</div>
      </div>
      <button class="del-btn" data-id="${entry.id}">×</button>`;
    div.querySelector(".del-btn").addEventListener("click", async () => {
      try {
        await dbDelete(entry.id);
        entries = entries.filter(e => e.id !== entry.id);
        renderToday();
      } catch(e) { showError("Ошибка удаления"); }
    });
    list.appendChild(div);
  });

  updateHeader(totals);
}

function updateHeader(totals) {
  const progress = Math.min((totals.kcal/goal)*100, 100);
  const remaining = goal - totals.kcal;
  const over = remaining < 0;
  el("kcal-num").textContent = totals.kcal;
  el("remaining").textContent = over ? `+${Math.abs(remaining)} перебор` : `−${remaining} осталось`;
  el("remaining").style.color = over ? "#f87171" : "#4ade80";
  el("prog-fill").style.width = progress + "%";
  el("prog-fill").style.background = progress>95?"#f87171":progress>75?"#fb923c":"#f59e0b";
  el("m-p").textContent = totals.protein + "г";
  el("m-f").textContent = totals.fat + "г";
  el("m-c").textContent = totals.carbs + "г";
  el("m-fi").textContent = totals.fiber + "г";
}

async function renderHistory() {
  el("hist-loading").style.display = "block";
  el("hist-content").style.display = "none";
  el("hist-empty").style.display = "none";
  try {
    const rows = await dbHistory();
    el("hist-loading").style.display = "none";
    if (!rows.length) { el("hist-empty").style.display = "block"; return; }

    // Group by date
    const byDate = {};
    rows.forEach(r => { if(!byDate[r.date]) byDate[r.date]=[]; byDate[r.date].push(r); });

    const cont = el("hist-content");
    cont.innerHTML = "";
    Object.keys(byDate).sort().reverse().forEach(date => {
      const dayEntries = byDate[date];
      const totalKcal = dayEntries.reduce((s,e)=>s+e.kcal,0);
      const d = new Date(date + "T12:00:00");
      const label = d.toLocaleDateString("ru-RU", { weekday:"short", day:"numeric", month:"short" });

      const block = document.createElement("div");
      block.className = "day-block";
      block.innerHTML = `
        <div class="day-header">
          <span class="day-title">${esc(label)}</span>
          <span class="day-kcal">${totalKcal} ккал</span>
        </div>`;
      dayEntries.forEach(entry => {
        const div = document.createElement("div");
        div.className = "entry";
        div.innerHTML = `
          <div class="entry-body">
            <div class="entry-name">${esc(entry.name||entry.text)}</div>
            <div class="entry-macros">
              <span style="color:#60a5fa">Б ${entry.protein}г</span>
              <span style="color:#f59e0b">Ж ${entry.fat}г</span>
              <span style="color:#4ade80">У ${entry.carbs}г</span>
              <span style="color:#c084fc">К ${entry.fiber}г</span>
            </div>
          </div>
          <div class="entry-right">
            <div class="entry-kcal">${entry.kcal}</div>
            <div class="entry-time">${entry.time}</div>
          </div>`;
        block.appendChild(div);
      });
      cont.appendChild(block);
    });
    cont.style.display = "block";
  } catch(e) {
    el("hist-loading").textContent = "Ошибка загрузки истории";
  }
}

function switchTab(tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  el("page-" + tab).classList.add("active");
  el("nav-" + tab).classList.add("active");
  if (tab === "today") {
    el("input-bar").classList.add("visible");
    updateHeader(entries.reduce((a,e)=>({kcal:a.kcal+e.kcal,protein:a.protein+e.protein,fat:a.fat+e.fat,carbs:a.carbs+e.carbs,fiber:a.fiber+e.fiber}),{kcal:0,protein:0,fat:0,carbs:0,fiber:0}));
  } else {
    el("input-bar").classList.remove("visible");
    renderHistory();
  }
}

// --- Init ---
async function initApp() {
  el("key-screen").style.display = "none";
  el("app").style.display = "flex";

  const dateStr = new Date().toLocaleDateString("ru-RU", { weekday:"long", day:"numeric", month:"long" });
  el("date-label").textContent = dateStr;
  el("goal-display").textContent = goal;

  try {
    entries = await dbLoad(TODAY);
  } catch(e) {
    entries = [];
    showError("Нет соединения с БД");
  }
  renderToday();

  const foodInput = el("food-input");
  const sendBtn = el("send-btn");

  foodInput.addEventListener("input", () => { sendBtn.className = foodInput.value.trim()?"ready":""; });
  foodInput.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleAdd();} });
  sendBtn.addEventListener("click", handleAdd);

  async function handleAdd() {
    const text = foodInput.value.trim();
    if (!text || sendBtn.disabled) return;
    showError("");
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<span class="spinner">◌</span>';
    sendBtn.className = "";
    try {
      const n = await estimateNutrition(text);
      const entry = {
        id: Date.now(),
        date: TODAY,
        text,
        name: n.name || text,
        time: new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}),
        kcal: Math.round(n.kcal),
        protein: Math.round(n.protein),
        fat: Math.round(n.fat),
        carbs: Math.round(n.carbs),
        fiber: Math.round(n.fiber),
      };
      await dbInsert(entry);
      entries.push(entry);
      foodInput.value = "";
      renderToday();
    } catch(e) { showError("Ошибка: " + e.message); }
    sendBtn.disabled = false;
    sendBtn.innerHTML = "↑";
    sendBtn.className = foodInput.value.trim()?"ready":"";
  }

  el("gear-btn").addEventListener("click", () => { el("goal-input").value=goal; el("goal-modal").style.display="flex"; });
  el("goal-cancel").addEventListener("click", () => { el("goal-modal").style.display="none"; });
  el("goal-confirm").addEventListener("click", () => {
    const n = parseInt(el("goal-input").value);
    if(n>0){ goal=n; localStorage.setItem("goal",n); el("goal-display").textContent=n; renderToday(); }
    el("goal-modal").style.display="none";
  });
}

// --- API Key screen ---
const keyInput = el("key-input");
const keySave  = el("key-save");
keyInput.addEventListener("input", () => { keySave.className = keyInput.value.startsWith("sk-ant")?"ready":""; });
keySave.addEventListener("click", () => {
  const k = keyInput.value.trim();
  if(!k.startsWith("sk-ant")||k.length<30) return;
  apiKey = k;
  localStorage.setItem("anthropic_key", k);
  initApp();
});
